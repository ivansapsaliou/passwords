{% extends "base.html" %}

{% block title %}Ошибка сервера{% endblock %}

{% block content %}
<div class="container py-5 text-center page-narrow">
    <div class="card card-elevated border-0 mx-auto" style="max-width: 420px;">
        <div class="card-body p-5">
            <p class="display-1 text-danger mb-0">500</p>
            <h1 class="h4 mt-2">Что-то пошло не так</h1>
            <p class="text-muted small">Попробуйте позже или обратитесь к администратору.</p>
            <a href="{{ url_for('main.dashboard') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-primary mt-2">На главную</a>
        </div>
    </div>
</div>
{% endblock %}
