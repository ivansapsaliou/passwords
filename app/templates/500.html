{% extends "base.html" %}
{% block title %}Ошибка сервера{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center py-5" style="min-height:60vh;">
  <div class="text-center animate-fadein">
    <p class="mb-2" style="font-family:var(--font-mono);font-size:5rem;font-weight:800;color:var(--rose-400);line-height:1;text-shadow:0 0 40px var(--rose-glow);">500</p>
    <h1 class="h4 mb-2">Что-то пошло не так</h1>
    <p class="text-muted mb-4" style="font-size:0.875rem;">Попробуйте позже или обратитесь к администратору.</p>
    <a href="{{ url_for('main.dashboard') if current_user.is_authenticated else url_for('auth.login') }}"
       class="btn btn-primary btn-lg">
      <i class="bi bi-arrow-left me-1"></i>На главную
    </a>
  </div>
</div>
{% endblock %}
